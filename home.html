<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">
</head>

<body class="bg-light">

    <header class="topbar navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <div class="navbar-brand logo">Sistema PV</div>
            <div class="d-flex align-items-center user-info">
                <span id="nomeVendedor" class="me-3"></span>
                <button type="button" class="btn btn-outline-danger" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="container container-home py-4">
        <div class="row">
            <div class="col-12 text-start">
                <h1 class="mb-4">Bem-vindo ao Sistema PV</h1>

                <div class="d-flex flex-wrap gap-2">
                    <button type="button" class="btn btn-warning btn-lg"
                        onclick="location.href='clientes.html'">Cadastrar Cliente</button>
                    <button type="button" class="btn btn-warning btn-lg"
                        onclick="location.href='clientes-lista.html'">Ver Clientes</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/home.js"></script>
</body>

</html>
