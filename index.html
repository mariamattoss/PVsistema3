<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100 bg-light">

    <div class="login-box card shadow">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-4 text-center text-dark">Sistema de Clientes</h1>

            <input type="email" id="email" class="form-control form-control-lg mb-3" placeholder="Email">
            <input type="password" id="senha" class="form-control form-control-lg mb-3" placeholder="Senha">

            <button type="button" class="btn btn-warning btn-lg w-100" onclick="login()">Entrar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
